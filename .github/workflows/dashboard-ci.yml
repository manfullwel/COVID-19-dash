name: dashboard-ci

on:
  push:
  pull_request:

jobs:
  health-gate:
    name: Health Gate (/health)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start dashboard
        run: |
          PORT=8051 python dashboard.py > dashboard.log 2>&1 &
          echo $! > dashboard.pid

      - name: Run /health gate
        run: |
          python tests/http_health_check.py

      - name: Upload dashboard logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-log-health-gate
          path: dashboard.log

      - name: Stop dashboard
        if: always()
        run: |
          if [ -f dashboard.pid ]; then
            kill "$(cat dashboard.pid)" || true
          fi

  e2e-playwright-gate:
    name: E2E Gate (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: health-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: |
          python -m playwright install --with-deps chromium

      - name: Run dashboard E2E
        run: |
          python tests/e2e_playwright_dashboard.py

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-e2e-artifacts
          path: |
            artifacts/dashboard-e2e.png
