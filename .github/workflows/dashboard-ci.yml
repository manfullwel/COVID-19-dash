name: dashboard-ci

on:
  push:
  pull_request:

jobs:
  health-gate:
    name: Health Gate (/health)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Health gate não depende de Playwright.
          # Instala apenas o mínimo necessário para subir o app e validar /health.
          pip install \
            dash==2.14.1 \
            dash-bootstrap-components==1.5.0 \
            plotly==5.18.0 \
            pandas==2.1.3 \
            numpy==1.26.2 \
            python-dotenv==1.0.0 \
            requests==2.31.0

      - name: Start dashboard and run /health gate
        run: |
          set -euo pipefail
          PORT=8051 python dashboard.py > dashboard.log 2>&1 &
          DASH_PID=$!
          trap 'kill ${DASH_PID} || true' EXIT
          python tests/http_health_check.py

      - name: Upload dashboard logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-log-health-gate
          path: dashboard.log

      - name: Print dashboard logs on failure
        if: failure()
        run: |
          echo "==== dashboard.log ===="
          cat dashboard.log || true

  e2e-playwright-gate:
    name: E2E Gate (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: health-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: |
          python -m playwright install --with-deps chromium

      - name: Run dashboard E2E
        run: |
          python tests/e2e_playwright_dashboard.py

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-e2e-artifacts
          path: |
            artifacts/dashboard-e2e.png
